version: '3.9'
services:
  scoreboard-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: codewars-scoring-app:latest
    container_name: codewars-scoring-app
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
